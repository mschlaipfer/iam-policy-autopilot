description = "Python file swapping s3.get_object for s3.put_object – produces two comments: one on the added put_object line listing new write permissions (kms:GenerateDataKey annotated as FAS), and one on the same line listing removed read permissions"
region = "us-east-1"
account = "123456789012"
service_hints = ["s3"]
explain = true

diff = """
diff --git a/src/handler.py b/src/handler.py
--- a/src/handler.py
+++ b/src/handler.py
@@ -1,3 +1,3 @@
 import boto3
 s3 = boto3.client('s3')
-s3.get_object(Bucket='my-bucket', Key='my-key')
+s3.put_object(Bucket='my-bucket', Key='my-key', Body=b'data')
"""

[base_files]
"src/handler.py" = """
import boto3
s3 = boto3.client('s3')
s3.get_object(Bucket='my-bucket', Key='my-key')
"""

[head_files]
"src/handler.py" = """
import boto3
s3 = boto3.client('s3')
s3.put_object(Bucket='my-bucket', Key='my-key', Body=b'data')
"""

# Comment 1: new permissions for the added put_object call, anchored to line 3
[[expected_comments]]
path = "src/handler.py"
line = 3
body = """
⚠️ **New IAM permissions required by this change:**

- `kms:GenerateDataKey` — needed for [Forward Access Session](https://docs.aws.amazon.com/IAM/latest/UserGuide/access_forward_access_sessions.html) permissions
- `s3-object-lambda:PutObject`
- `s3:PutObject`
- `s3:PutObjectAcl`
- `s3:PutObjectLegalHold`
- `s3:PutObjectRetention`
- `s3:PutObjectTagging`

> These permissions were detected via static analysis of the added code.
> Review carefully before granting."""

# Comment 2: removed permissions (get_object is gone), anchored to the removed line (3, LEFT side)
[[expected_comments]]
path = "src/handler.py"
line = 3
side = "LEFT"
body = """
✅ **IAM permissions no longer required after this change:**

- `kms:Decrypt`
- `s3-object-lambda:GetObject`
- `s3:GetObject`
- `s3:GetObjectLegalHold`
- `s3:GetObjectRetention`
- `s3:GetObjectTagging`
- `s3:GetObjectVersion`"""
