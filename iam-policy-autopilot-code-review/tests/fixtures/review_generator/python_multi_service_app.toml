[head_files]
"app.py" = """
import boto3


def upload_file_to_s3(bucket_name, file_path, object_key):
    s3 = boto3.client("s3")
    s3.upload_file(file_path, bucket_name, object_key)


def read_secret(secret_name):
    client = boto3.client("secretsmanager")
    response = client.get_secret_value(SecretId=secret_name)
    return response["SecretString"]


def put_item_to_dynamodb(table_name, item):
    dynamodb = boto3.resource("dynamodb")
    table = dynamodb.Table(table_name)
    table.put_item(Item=item)


def send_sqs_message(queue_url, message_body):
    sqs = boto3.client("sqs")
    sqs.send_message(QueueUrl=queue_url, MessageBody=message_body)


if __name__ == "__main__":
    upload_file_to_s3("my-bucket", "data.csv", "uploads/data.csv")
    read_secret("my-app/db-password")
"""

