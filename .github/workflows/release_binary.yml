name: Release Binary

# Triggered manually or when a release is published.
# Builds the iam-policy-autopilot binary for Linux x86_64 (the architecture
# used by GitHub Actions ubuntu-latest runners) and uploads it to the release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the binary to (e.g. v0.1.4)"
        required: true

permissions:
  contents: write   # needed to upload release assets

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64 binary
    runs-on: ubuntu-latest
    # Guard: only run on the personal fork, never on the upstream repo.
    if: github.repository == 'mschlaipfer/iam-policy-autopilot'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --bin iam-policy-autopilot

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binary
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="iam-policy-autopilot-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          cp target/release/iam-policy-autopilot .
          tar czf "${ARCHIVE}" iam-policy-autopilot
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ env.ARCHIVE }}
